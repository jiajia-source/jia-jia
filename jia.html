<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JiaJia</title>
</head>
<body>
    <div class="JIA-app">
    <div class="title">JIAJIA APP</div>
    <div class="JIA-from">
        <input class="JIA-input" type="text" placeholder="add" />
        <div class="JIA-button" onclick="addTodo()" >ADD JIAJIA</div> 
    </div>
    <div id="todoList"></div>
</div>
    
<style>
    .completed{
     text-decoration: line-through;
     opacity: 0.4;
    }
    .del{
    color: deeppink;
    cursor: pointer;
    user-select: none;
    }
    .item{
     display: flex;
     align-items: center;
     justify-content: space-between;
     box-sizing: border-box;
     width: 80%;
     height: 50px;
     margin: 8px auto;
     padding: 16px;
     border-radius: 20px;
     box-shadow: rgba(149, 157, 165, 0.2) 0px 8px 20px;
     background: #fff;
    }
    .JIA-button{
      width: 100px;
      height: 52px;
      border-radius: 0 20px 20px 0; 
      line-height:52px ; 
      text-align: center;
      background: linear-gradient(to right, #ffd1dc, #faf8f3);
      cursor: pointer;
      user-select: none;
      color: deeppink;
    }
    .JIA-input{
       margin-bottom: 20px;
       padding-left: 15px;
       border: 1px solid #dfe1e5;
       outline: none;
       width: 60%;
       height: 50px;
       border-radius:20px 0 0 20px ;
    }
    .JIA-from{
    display: flex;
    margin-top: 20px; 
    margin-left: 30px;   
    }
   body {
  background: linear-gradient(to right, #ffd1dc, #faf8f3);     
  min-height: 100vh;
  margin: 0;
         }
   .JIA-app{
    width: 98%;
    height: auto;
    padding-top: 30px;
    box-sizing: border-box;
    background-color: #ffff;
    border-radius: 5px;
    margin-top: 40px;
    margin-left:1% ;
    padding-bottom: 30px;
   }
   .title{
      font-size: 30px;
      font-weight: 700;
      text-align: center;
   }
    .name{
     font-size: 16px;
     margin-left: 8px;
    }
    input[type="checkbox"] {
        cursor: pointer;
        width: 16px;
        height: 16px;
    }
</style>

<!-- 换成国内更稳定的 unpkg CDN 源 -->
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
    // ====== 重新从后台复制粘贴你的密钥，不要手动输入！ ======
    const supabaseUrl = 'https://axaklflwzrsilvmzeaqr.supabase.co';
    const supabaseKey = 'sb_publishable_-mhXxjr5SMEY1oc5oFzO4A_t7O-8OyX';
    // =================================

    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
    const input = document.querySelector('.JIA-input');
    const todoList = document.getElementById('todoList');

    // 回车添加
    input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') addTodo();
    });

    // 页面加载拉取数据
    window.onload = function() {
        fetchTodos();
    }

    // 查询待办
    async function fetchTodos() {
        const { data, error } = await supabase
            .from('todo_list')
            .select('*')
            .order('created_at', { ascending: true });

        if (error) {
            console.error('加载失败，错误信息：', error);
            alert('数据库连接失败，请按F12看控制台报错');
            return;
        }

        renderList(data);
    }

    // 渲染列表
    function renderList(list) {
        todoList.innerHTML = '';
        list.forEach(item => {
            const div = document.createElement('div');
            div.className = `item ${item.completed ? 'completed' : ''}`;
            div.dataset.id = item.id;
            div.innerHTML = `
                <div>
                    <input type="checkbox" onchange="toggleDone(this)" ${item.completed ? 'checked' : ''} />
                    <span class="name">${item.content}</span>
                </div>
                <div class="del" onclick="deleteItem(this)">over</div>
            `;
            todoList.appendChild(div);
        });
    }

    // 新增待办
    async function addTodo() {
        const text = input.value.trim();
        if (!text) return;

        const { error } = await supabase
            .from('todo_list')
            .insert([{ content: text, completed: false }]);

        if (error) {
            console.error('添加失败：', error);
            return;
        }

        input.value = '';
        input.focus();
        fetchTodos();
    }

    // 切换完成状态
    async function toggleDone(checkbox) {
        const item = checkbox.closest('.item');
        const id = Number(item.dataset.id);
        const isCompleted = checkbox.checked;

        const { error } = await supabase
            .from('todo_list')
            .update({ completed: isCompleted })
            .eq('id', id);

        if (error) {
            console.error('更新失败：', error);
            return;
        }

        if (isCompleted) {
            item.classList.add('completed');
        } else {
            item.classList.remove('completed');
        }
    }

    // 删除待办
    async function deleteItem(delBtn) {
        const item = delBtn.closest('.item');
        const id = Number(item.dataset.id);

        const { error } = await supabase
            .from('todo_list')
            .delete()
            .eq('id', id);

        if (error) {
            console.error('删除失败：', error);
            return;
        }

        item.remove();
    }
</script>

</body>
</html>
