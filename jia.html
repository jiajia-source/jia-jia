<!DOCTYPE html>
<!-- html根标签，页面语言设置为中文 -->
<html lang="en">
<!-- 头部区域：存放页面配置、样式，不显示在页面可视区域 -->
<head>
    <!-- 字符编码：UTF-8支持中文不乱码 -->
    <meta charset="UTF-8">
    <!-- 适配手机端：自动匹配设备屏幕宽度，初始缩放1倍 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 浏览器标签页标题 -->
    <title>JiaJia</title>
</head>
<!-- 页面主体：所有看得见的内容都写在这里 -->
<body>
    <!-- 最外层容器，包裹整个应用所有内容 -->
    <div class="JIA-app">
    <!-- 页面标题 -->
    <div class="title">JIAJIA APP</div>
    <!-- 输入框+按钮的容器，横向排列 -->
    <div class="JIA-from">
        <!-- 文本输入框，占位提示文字add -->
        <input class="JIA-input" type="text" placeholder="add" />
        <!-- 添加按钮，点击触发addTodo新增函数 -->
        <div class="JIA-button" onclick="addTodo()" >ADD JIAJIA</div> 
    </div>
    <!-- 待办列表容器，所有待办项动态渲染到这里 -->
    <div id="todoList"></div>
</div>
    
<!-- CSS样式标签，写页面所有外观样式 -->
<style>
    /* 已完成待办的样式类 */
    .completed{
     text-decoration: line-through;  /* 文字中间加删除划线 */
     opacity: 0.4; /* 透明度降低，变浅 */
    }
    /* 删除按钮样式 */
    .del{
    color: deeppink; /* 文字深粉色 */
    cursor: pointer; /* 鼠标放上去变成手指样式 */
    user-select: none; /* 禁止鼠标选中文字 */
    }
    /* 单条待办条目容器 */
    .item{
     display: flex;  /* 弹性布局，内部元素横向排列 */
     align-items: center; /* 内部元素垂直居中 */
     justify-content: space-between;  /* 左右两端分开对齐 */
     box-sizing: border-box; /* 内边距、边框算进总宽度，不会撑大盒子 */
     width: 80%; /* 宽度占父容器80% */
     height: 50px; /* 固定高度50像素 */
     margin: 8px auto;  /* 上下外边距8px，左右自动居中 */
     padding: 16px;   /* 内部四周留白16px */
     border-radius: 20px; /* 圆角20px，圆润边角 */
     box-shadow: rgba(149, 157, 165, 0.2) 0px 8px 20px;   /* 灰色柔和阴影 */
     background: #fff; /* 背景纯白色 */
    }
    /* 添加按钮样式 */
    .JIA-button{
      width: 100px; /* 固定宽度100px */
      height: 52px; /* 高度和输入框对齐 */
      border-radius: 0 20px 20px 0; /* 只做右侧圆角，左边和输入框拼接 */
      line-height:52px ;  /* 文字垂直居中，值等于盒子高度 */
      text-align: center;   /* 文字水平居中*/
      background: linear-gradient(to right, #ffd1dc, #faf8f3); /* 粉白渐变背景 */
      cursor: pointer;  /* 鼠标悬浮显示手指 */
      user-select: none;   /* 禁止选中按钮文字 */
      color: deeppink; /* 文字粉色 */
    }
    /* 输入框样式 */
    .JIA-input{
       margin-bottom: 20px; /* 和下方待办列表拉开距离 */
       padding-left: 15px; /* 输入文字距离左边框留白 */
       border: 1px solid #dfe1e5;  /* 浅灰色细边框 */
       outline: none;  /* 点击输入框时取消默认蓝色高亮边框 */
       width: 60%; /* 宽度占父盒子60% */
       height: 50px; /* 高度50px */
       border-radius:20px 0 0 20px ; /* 仅左侧圆角，和按钮拼接 */
    }
    /* 输入区域容器 */
    .JIA-from{
    display: flex;  /* 让输入框、按钮横向并排 */
    margin-top: 20px; /* 和上方标题拉开距离 */
    margin-left: 30px;   /* 整体左偏移30px */
    }
/* 页面全局背景样式 */
   body {
  background: linear-gradient(to right, #ffd1dc, #faf8f3);     /* 全局粉白渐变背景 */
  min-height: 100vh;  /* 最小高度占满整个浏览器屏幕 */
  margin: 0;    /* 清除浏览器默认自带页面边距 */
         }
/* 整个应用白色大盒子 */        
   .JIA-app{
    width: 98%;  /* 宽度占屏幕98%，左右留空隙 */
    height: auto;  /* 高度自适应，内容多自动撑开 */
    padding-top: 30px;  /* 顶部内部留白30px */
    box-sizing: border-box; /* 内边距不撑大盒子总宽 */
    background-color: #ffff; /* 纯白色背景*/
    border-radius: 5px;   /* 轻微圆角 */
    margin-top: 40px;   /* 距离页面顶部40px */
    margin-left:1% ; /* 左边留白1%，配合宽度实现居中 */
    padding-bottom: 30px; /* 底部内部留白30px */
   }
/* 顶部标题样式 */
   .title{
      font-size: 30px;    /* 文字字号30像素 */
      font-weight: 700;   /* 字体加粗 */
      text-align: center; /* 文字水平居中 */
   }
    /* 待办文字内容 */
    .name{
     font-size: 16px;
     margin-left: 8px; /* 和复选框拉开间距 */
    }
    /* 复选框样式 */
    input[type="checkbox"] {
        cursor: pointer; /* 鼠标悬浮变手指 */
        width: 16px;
        height: 16px;
    }
   
</style>

<!-- JS代码区域：页面交互逻辑，无任何第三方Supabase库 -->
<script>
// 获取页面输入框DOM元素
const input = document.querySelector('.JIA-input');
// 获取待办列表容器DOM元素
const todoList = document.getElementById('todoList');
// 本地存储标识key，用来保存待办数据
const STORAGE_KEY = "jia_todo_list";

// 初始化默认数据函数：第一次打开页面生成3条想你，第一条已完成划线
function initDefaultData() {
    // 读取本地存储，判断是否第一次打开页面（无数据代表首次访问）
    const exist = localStorage.getItem(STORAGE_KEY);
    if (!exist) {
        // 默认三条待办数组，第一条completed:true代表已勾选划线
        const defaultList = [
            { content: "想你", completed: true },
            { content: "想你", completed: false },
            { content: "想你", completed: false }
        ];
        // 将数组转为字符串存入浏览器本地存储，刷新不丢失
        localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultList));
    }
}

// 页面加载完成后自动执行
window.onload = function() {
    initDefaultData(); // 先初始化默认三条待办
    fetchTodos(); // 读取存储数据并渲染到页面
}

// 从本地存储读取所有待办数据
function fetchTodos() {
    // 读取本地存储，无数据则返回空数组
    let list = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    renderList(list); // 调用渲染函数展示列表
}

// 根据待办数组渲染页面列表
function renderList(list) {
    todoList.innerHTML = ''; // 先清空原有列表，避免重复渲染
    // 循环遍历每一条待办数据
    list.forEach((item, index) => {
        // 创建单个待办条目div盒子
        const div = document.createElement('div');
        // 根据完成状态添加completed划线样式
        div.className = `item ${item.completed ? 'completed' : ''}`;
        // 保存当前条目下标，用于修改、删除
        div.dataset.id = index;
        // 拼接条目内部HTML：复选框、文字、删除按钮
        div.innerHTML = `
            <div>
                <input type="checkbox" onchange="toggleDone(this)" ${item.completed ? 'checked' : ''} />
                <span class="name">${item.content}</span>
            </div>
            <div class="del" onclick="deleteItem(this)">over</div>
        `;
        // 将当前条目添加到列表容器中
        todoList.appendChild(div);
    })
}

// 新增待办函数，点击ADD按钮触发
function addTodo() {
    // 获取输入框内容，并去除首尾空格
    const text = input.value.trim();
    // 如果输入为空，直接终止函数，不新增
    if (!text) return;
    // 读取现有存储的待办列表
    let list = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    // 在数组末尾新增一条未完成待办
    list.push({
        content: text,
        completed: false
    })
    // 更新本地存储
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    // 清空输入框
    input.value = '';
    // 输入框重新获得光标，方便继续输入
    input.focus();
    // 重新渲染列表展示最新数据
    fetchTodos();
}

// 勾选/取消勾选，切换待办完成状态
function toggleDone(checkbox) {
    // 获取当前勾选框所属的整条待办盒子
    const itemDom = checkbox.closest('.item');
    // 获取这条待办的下标编号
    const idx = Number(itemDom.dataset.id);
    // 读取本地存储的待办数组
    let list = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    // 修改当前条目的完成状态，和复选框同步
    list[idx].completed = checkbox.checked;
    // 保存更新后的数据到本地存储
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    // 刷新页面列表
    fetchTodos();
}

// 删除单条待办，点击over文字触发
function deleteItem(delBtn) {
    // 获取删除按钮所属的整条待办盒子
    const itemDom = delBtn.closest('.item');
    // 获取这条待办的下标
    const idx = Number(itemDom.dataset.id);
    // 读取本地待办数组
    let list = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    // 从数组中删除对应下标的条目
    list.splice(idx, 1);
    // 更新本地存储
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    // 刷新列表
    fetchTodos();
}

// 监听输入框键盘按下事件，支持回车快速添加
input.addEventListener('keypress', function(e) {
    // 判断按下的按键是回车键Enter
    if (e.key === 'Enter') addTodo();
});
</script>

</body>
</html
